# .github/workflows/build.yml
# ─────────────────────────────────────────────────────────────
# Clarkston Ward – Auto-generate index.html from program_data.yml
#
# Triggers:
#   • Any push that changes program_data.yml   (main branch)
#   • Manual "Run workflow" click in GitHub UI  (workflow_dispatch)
#
# What it does:
#   1. Installs PyYAML
#   2. Runs generate_program.py → writes index.html
#   3. Commits & pushes the updated index.html back to main
#      (commit only happens if index.html actually changed)
#
# No secrets needed — uses the built-in GITHUB_TOKEN.
# ─────────────────────────────────────────────────────────────

name: Generate Sacrament Program

on:
  push:
    branches: [main]
    paths:
      - program_data.yml        # only re-run when the data file changes
  workflow_dispatch:            # also available as a manual "Run workflow" button

permissions:
  contents: write               # needed to commit index.html back to the repo

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      # 1 – Check out the repo
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2 – Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3 – Install PyYAML (only dependency)
      - name: Install dependencies
        run: pip install pyyaml

      # 4 – Generate index.html
      - name: Generate index.html
        run: python generate_program.py

      # 5 – Commit back (skipped automatically if nothing changed)
      - name: Commit generated index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet \
            && echo "index.html unchanged — nothing to commit." \
            || git commit -m "Auto-generate index.html from program_data.yml"

      # 6 – Push (no-op if commit was skipped)
      - name: Push
        run: git push
