name: Generate Program

on:
  push:
    branches: [main]
    paths:
      - program_data.yml
  workflow_dispatch:

# Only one generate at a time; newer push cancels in-flight (avoids stale git push races)
concurrency:
  group: generate-program-main
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies (WeasyPrint)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libpango-1.0-0 libpangoft2-1.0-0 \
            libharfbuzz0b libpangocairo-1.0-0 \
            libcairo2 libgdk-pixbuf2.0-0 \
            shared-mime-info fonts-liberation

      - name: Install Python dependencies
        run: pip install pyyaml weasyprint

      - name: Generate HTML and PDF
        run: python generate_program.py --pdf

      - name: Commit generated files
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html program.pdf
          if git diff --staged --quiet; then
            echo "No generated-file changes"
            exit 0
          fi
          git commit -m "Auto-generate program [skip ci]"
          # Rebase onto latest main then push; retry on race with concurrent pushes
          for i in 1 2 3 4 5; do
            git fetch origin main
            git pull --rebase origin main
            if git push origin HEAD:main; then
              echo "Push ok (attempt $i)"
              exit 0
            fi
            echo "Push failed attempt $i — retry"
            git rebase --abort 2>/dev/null || true
            sleep $((i * 3))
          done
          echo "Failed to push generated files after retries" >&2
          exit 1
