# Text-only announcements (title + body, no image required)
# Use "banner" instead of "title" to render a full-width navy header above the block.
text_announcements:
  - title: "Combined Meeting with White Lake Ward – April 26"
    body: "This Sunday we will have a combined Sacrament meeting with White Lake Ward at our normal time (9–10 am). Following Sacrament meeting, we will hold a combined 2nd hour with White Lake Ward and Pontiac Branch (10–11 am) focused on emergency preparedness.\n\n· Adults — Chapel: fire, tornado, and active shooter training\n· Youth — Gym: fire, tornado, and active shooter training\n· Primary — Primary room: singing time (1 hour), no breakout classes"

  - title: "Stake Conference Family Choir – May 31"
    body: "We invite you and your family to join a special choir at the Stake Conference general session on Sunday, May 31st, welcoming Elder Ronald M. Barcellos of the Seventy. The choir will sing “I Am a Child of God,” including a portion in Spanish. All are welcome — even if you cannot attend a practice!\n\nChoir Practices:\n· May 3 – 4:00 pm, Farmington Hills Building (Chapel)\n· May 17 – 4:00 pm, Farmington Hills Building (Chapel)\n· May 31 – 8:30 am, Bloomfield Hills Building (Primary/RS room)\n\nQuestions? Call 313-870-7482."

  - banner: "Ward Temple and Family History Plan"
    body: "DISCOVER — Find out who your family members are.\nGATHER — Collect names and information of family members and ancestors and add them to your family tree.\nUNITE — Attend the Temple. Unite yourself and your ancestors to the Lord. Seal families together for eternity.\n\nWard Temple and Family History Leader: Bro. John Tremonti — jtcarwash@comcast.net"
