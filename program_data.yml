# Note: image items can be placed anywhere in text_announcements to control order
text_announcements:
  - title: "Aaronic Priesthood Commemoration Campout"
    body: "All men and boys are invited!\n\nFriday, June 19 at 3:00 PM through Saturday, June 20 at 12:00 PM\nLocation: Independence Oaks"

  - image: "images/event5.jpg"
    alt:   "Stage Rush – Farmington Hills Stake Youth Variety Show – June 25, 2026"

  - title: "Stake Seminary Graduation – June 3"
    body: "All youth, parents, and youth leaders are invited to the Farmington Hills Michigan Stake Seminary Graduation on Wednesday, June 3rd from 7:00–8:30 pm at the Stake Center.\n\nAll youth in the stake are welcome — this takes the place of ward youth activities for that week. Families are especially encouraged to attend if you have graduating seniors.\n\nRefreshments will be served."

  - title: "Gospel Questions – June 7"
    body: "The Bells' Gospel Questions class will next meet on Sunday, June 7th in the Family Search Center during second hour. All are invited to join us! We will discuss and determine upcoming topics."

  - title: "Stake Conference Family Choir – May 31"
    body: "We invite you and your family to join a special choir at the Stake Conference general session on Sunday, May 31st, welcoming Elder Ronald M. Barcellos of the Seventy. The choir will sing \"I Am a Child of God,\" including a portion in Spanish. All are welcome — even if you cannot attend a practice!\n\nFinal Choir Practice:\n· May 31 – 8:30 am, Bloomfield Hills Building (Primary/RS room)\n\nQuestions? Call 313-870-7482."

  - image: "images/event4.jpg"
    alt:   "Walk With Me – Farmington Hills Stake Youth Conference – June 25–27, 2026 – Detroit"

  - banner: "Ward Temple and Family History Plan"
    body: "DISCOVER — Find out who your family members are.\nGATHER — Collect names and information of family members and ancestors and add them to your family tree.\nUNITE — Attend the Temple. Unite yourself and your ancestors to the Lord. Seal families together for eternity.\n\nWard Temple and Family History Leader: Bro. John Tremonti — jtcarwash@comcast.net"
