text_announcements:
  - title: "Primary Pioneer Day Celebration"
    body: "This Saturday, July 25, from 2:00–3:30 p.m., Primary will celebrate Pioneer Day at the church. Join us for pioneer games! Feel free to wear pioneer clothing and come ready to learn about a pioneer ancestor in your family (membership in the Church is not required). Refreshments will be served."

  - title: "Ward Temple Night"
    body: "Beginning this month, Ward Temple Night has been rescheduled to the third Friday of each month (instead of the third Thursday). Come serve together in the house of the Lord."

  - title: "Youth Music Festival"
    body: "The Youth Music Festival is coming — we need performances and friends to come. This event is for all youth turning 12 this year and older. See the flyer for details, and please share it with friends from neighboring stakes."

  - title: "Sunday Class Schedule Changes – September 2026"
    url: "https://www.churchofjesuschrist.org/feature/sunday-meeting-schedule?lang=eng"
    body: "Beginning the first week of September 2026, the Sunday class schedule will change. Sacrament meeting continues at 60 minutes, followed by a weekly 25-minute Sunday School class and a 25-minute Elders Quorum, Relief Society, or Young Women meeting. Primary will continue weekly and last 55 minutes."

  - title: "Relief Society Stake Temple Day"
    body: "All sisters are invited to the Farmington Hills Stake Relief Society Temple Day on Saturday, September 19, 2026. Watch for the invitation flyer with details, and plan to attend!"

  - banner: "Ward Temple and Family History Plan"
    body: "DISCOVER — Find out who your family members are.\nGATHER — Collect names and information of family members and ancestors and add them to your family tree.\nUNITE — Attend the Temple. Unite yourself and your ancestors to the Lord. Seal families together for eternity.\n\nWard Temple and Family History Leader: Bro. John Tremonti — jtcarwash@comcast.net"
