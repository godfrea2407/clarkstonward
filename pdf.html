<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sacrament Program (PDF) – Clarkston Ward</title>
  <style>
    :root {
      --navy: #1a2e4a;
      --gold:  #c9a84c;
      --light: #f7f5f0;
      --white: #ffffff;
      --muted: #666666;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: var(--light);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header {
      background: var(--navy);
      color: var(--white);
      padding: .8rem 1rem;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    header h1 { font-size: 1.1rem; font-weight: normal; letter-spacing: .04em; }
    header .date { font-size: .95rem; color: var(--gold); }
    .nav-links {
      display: flex;
      gap: 1.2rem;
      align-items: center;
    }
    .nav-links a {
      color: var(--gold);
      text-decoration: none;
      font-size: .82rem;
      letter-spacing: .05em;
      opacity: .9;
    }
    .nav-links a:hover { opacity: 1; text-decoration: underline; }
    .pdf-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 1rem;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }
    iframe {
      flex: 1;
      width: 100%;
      min-height: calc(100vh - 80px);
      border: none;
      border-radius: 6px;
      box-shadow: 0 2px 12px rgba(0,0,0,.15);
      background: var(--white);
    }
    .fallback {
      display: none;
      text-align: center;
      padding: 2rem;
      color: var(--muted);
    }
    .fallback a {
      display: inline-block;
      margin-top: 1rem;
      background: var(--navy);
      color: var(--white);
      padding: .7rem 1.5rem;
      border-radius: 6px;
      text-decoration: none;
    }
    footer {
      text-align: center;
      font-size: .75rem;
      color: var(--muted);
      padding: 1rem;
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Sacrament Meeting Program</h1>
    <div class="date">Sunday, April 12, 2026 &bull; Clarkston Ward</div>
  </div>
  <div class="nav-links">
    <a href="index.html">&#8592; Web Version</a>
    <a href="program.pdf" download>&#8681; Download PDF</a>
  </div>
</header>

<div class="pdf-wrapper">
  <iframe src="program.pdf" title="Sacrament Meeting Program PDF">
    <div class="fallback">
      <p>Your browser cannot display the PDF inline.</p>
      <a href="program.pdf">Open PDF directly</a>
    </div>
  </iframe>
</div>

<footer>
  Clarkston Ward &bull; Farmington Hills Michigan Stake &bull; The Church of Jesus Christ of Latter-day Saints
</footer>

</body>
</html>
